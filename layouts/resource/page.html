{{ define "title" }}
  <h3>Resource</h3>
  <h1>{{ .Title }}</h1>
  {{ with .Params.URL }}
    {{ if . }}
      {{ $ctx := dict "vendor" "fas" "name" "globe" }}
      {{ partial "icons/icon" $ctx }}
      <a href="{{ . }}">{{ . }}</a>
    {{ end }}
    </div>
  {{ end }}
{{ end }}

{{ define "main" }}
  {{ .Content }}
  {{ partial "tags" . }}
{{ end }}
