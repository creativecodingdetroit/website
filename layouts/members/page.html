{{ define "title" }}
  <h3>Member</h3>
  <h1>{{ .Title }}</h1>
{{ end }}

{{ define "main" }}
  {{ .Content }}

  {{ with .Params.tags }}
    {{ if ge (len .) 1 }}
      <div class="tags">
        {{ range . }}
          <a href="{{ $.Site.BaseURL }}tags/{{ . | urlize }}/" class="tag">{{ . }}</a>
        {{ end -}}
      </div>
    {{ end }}
  {{ end }}
{{ end }}
