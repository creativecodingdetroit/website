<div class="card" onclick="window.location = this.querySelector('a[href]').getAttribute('href')">
  <h3>
    {{ partial "type" . }}
    <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
    {{ partial "forum-tag" . }}
  </h3>
  <div class="description">{{ .Description }}</div>
  {{ partial "tags" . }}
</div>
