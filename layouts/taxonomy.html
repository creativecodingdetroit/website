{{ define "title" }}
  <h1>{{ .Title }}</h1>
{{ end }}

{{ define "main" }}
  {{ .Content }}
  {{ partial "search" "search-container" }}
  <div class="terms tags" id="search-container">
  {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="label tag">{{ .LinkTitle }}</a>
  {{ end }}
  </div>
{{ end }}
